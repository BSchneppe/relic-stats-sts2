name: Build Mod
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ref-assemblies:
          - '0.99.*'
          - '0.102.0-beta-5fd772f8'
    name: Build (ref ${{ matrix.ref-assemblies }})
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore dependencies
        run: dotnet restore -p:RefAssembliesVersion=${{ matrix.ref-assemblies }}
      - name: Build
        run: dotnet build -c Release --no-restore -p:RefAssembliesVersion=${{ matrix.ref-assemblies }}
