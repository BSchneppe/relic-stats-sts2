name: Release
on:
  push:
    tags: ['v*']
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build -c Release --no-restore
      - name: Package Release Artifacts
        run: |
          mkdir -p release/RelicStats
          find .godot/mono/temp/bin/Release/ -name "RelicStats.dll" -exec cp {} release/RelicStats/ \;
          cp RelicStats.json release/RelicStats/
          cd release
          zip -r ../RelicStats-v${{ steps.version.outputs.version }}.zip RelicStats
      - name: Pack NuGet
        run: dotnet pack -c Release -o ./nupkg -p:Version=${{ steps.version.outputs.version }} --no-build
      - name: Push to nuget.org
        run: dotnet nuget push ./nupkg/*.nupkg --source "https://api.nuget.org/v3/index.json" --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: RelicStats-v${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
